services:
  db:
    image: postgres:16
    container_name: dentops_db
    environment:
      POSTGRES_USER: dentops
      POSTGRES_PASSWORD: dentops
      POSTGRES_DB: dentops
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dentops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dentops_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dentops
      MINIO_ROOT_PASSWORD: dentopsdentops
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
  minio_data:

